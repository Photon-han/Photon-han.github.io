<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的小说馆</title>
    <link rel="stylesheet" href="style.css">
    <!-- marked.js 用于把 Markdown 转成 HTML -->
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>📖 作品列表</h2>
            <ul id="novel-list">
                <!-- 这里先手动列一篇示例小说，后面你可以加更多 -->
                <li data-file="novels/残唐孤脉.md">🌙 残唐孤脉</li>
            </ul>
        </aside>
        <main class="content" id="novel-content">
            <p class="placeholder">✨ 点击左侧篇目，开始阅读 ✨</p>
        </main>
    </div>
    <script src="main.js"></script>

    <!-- 右下角老母鸡互动组件 -->
<style>
  .chicken-corner {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    cursor: pointer;
    user-select: none;
    transition: transform 0.1s ease;
    text-align: center;
    filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2));
  }
  .chicken-body {
    background: #f5c542;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    transition: all 0.1s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    border: 2px solid #e0a800;
  }
  .chicken-body:active {
    transform: scale(0.85);
  }
  .hit-count {
    font-size: 14px;
    background: #8b5a2b;
    color: #ffefc0;
    border-radius: 20px;
    padding: 2px 8px;
    margin-top: 5px;
    font-weight: bold;
  }
  .bubble {
    position: absolute;
    bottom: 80px;
    right: 20px;
    background: white;
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 14px;
    font-weight: bold;
    color: #c14b1a;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    animation: fadeUp 0.8s ease-out forwards;
    pointer-events: none;
    font-family: sans-serif;
  }
  @keyframes shake {
    0% { transform: translate(1px, 1px) rotate(0deg); }
    20% { transform: translate(-1px, -2px) rotate(-1deg); }
    40% { transform: translate(-2px, 2px) rotate(1deg); }
    60% { transform: translate(2px, -1px) rotate(0deg); }
    80% { transform: translate(-1px, 1px) rotate(1deg); }
    100% { transform: translate(0,0) rotate(0); }
  }
  .shake-chicken {
    animation: shake 0.3s ease-in-out 0s 2;
  }
  @keyframes fadeUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-40px); }
  }
</style>

<div class="chicken-corner" id="chickenCorner">
  <div class="chicken-body" id="chickenBody">
    🐔
  </div>
  <div class="hit-count" id="hitCount">揍了 0 次</div>
</div>

<script>
  (function() {
    let hitTotal = 0;
    const chickenDiv = document.getElementById('chickenCorner');
    const chickenBody = document.getElementById('chickenBody');
    const hitCountSpan = document.getElementById('hitCount');

    // 揍它时的台词库
    const phrases = [
      '咕！', '痛！', '别揍我！', '咯咯咯！', '你等着！', '再揍报警了！',
      '🥚 下了个蛋', '老母鸡记仇', '↓ 该页无法显示', '😭', '饶命～', '噗！'
    ];

    function showBubble(text) {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      chickenDiv.appendChild(bubble);
      setTimeout(() => bubble.remove(), 800);
    }

    function hitChicken() {
      // 增加计数
      hitTotal++;
      hitCountSpan.textContent = `揍了 ${hitTotal} 次`;

      // 抖动效果
      chickenBody.classList.add('shake-chicken');
      setTimeout(() => {
        chickenBody.classList.remove('shake-chicken');
      }, 300);

      // 显示随机气泡
      const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
      showBubble(randomPhrase);

      // 额外效果：右下角轻微震动（可选）
      const originalTransform = chickenDiv.style.transform;
      chickenDiv.style.transform = 'translate(2px, 2px)';
      setTimeout(() => { chickenDiv.style.transform = originalTransform; }, 80);
    }

    chickenCorner.addEventListener('click', hitChicken);
  })();
</script>
</body>
</html>
